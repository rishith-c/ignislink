name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  node:
    name: Node workspace
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      - run: pnpm typecheck
      - run: pnpm build

  python:
    name: Python services
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e "apps/api-py[dev]" -e "apps/worker[dev]"
      - run: python -m pytest apps/api-py/tests apps/worker/tests
      - run: python -m ruff check apps/api-py apps/worker
